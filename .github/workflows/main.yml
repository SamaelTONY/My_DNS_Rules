name: 🔄 Update ADG Rules

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    name: 🛠️ 规则加工处理
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: ⬇️ 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 删掉了引起报错的 cache: 'pip'

      - name: 📦 安装必要依赖
        run: pip install requests urllib3

      - name: 🚀 执行规则合并脚本
        run: python process_rules.py -o my_adg_rules.txt

      - name: 📤 智能提交与同步
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 自动同步更新：ADG 规则列表"
          file_pattern: "my_adg_rules.txt"
          push_options: '--force'
          skip_fetch: true
